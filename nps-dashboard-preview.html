<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>LimeChat · NPS dashboard (preview)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f5f7fa;--card:#fff;--line:#e6e9ef;--ink:#16202c;--muted:#6b7787;--accent:#1fa97a;--promoter:#1fa97a;--passive:#e0a500;--detractor:#e5533c;--shadow:0 1px 3px rgba(16,32,44,.06),0 8px 24px rgba(16,32,44,.05);}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
.shell{max-width:1180px;margin:0 auto;padding:28px 24px 64px;}
header.top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;}
header.top h1{font-size:20px;margin:0;}
header.top .sub{color:var(--muted);font-size:13px;}
.banner{background:#eef4ff;border:1px solid #d5e2ff;color:#2a5bd7;font-size:12px;border-radius:10px;padding:8px 12px;margin:12px 0 18px;}
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px;}
.seg{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.seg button{border:0;background:transparent;padding:8px 14px;font-size:13px;color:var(--muted);cursor:pointer;}
.seg button.active{background:var(--accent);color:#fff;font-weight:600;}
.filters select{padding:8px 10px;border:1px solid var(--line);border-radius:10px;background:var(--card);font-size:13px;color:var(--ink);}
.spacer{flex:1;}
.btn{border:1px solid var(--line);background:var(--card);border-radius:10px;padding:8px 14px;font-size:13px;cursor:pointer;color:var(--ink);}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow);}
.card .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.card .big{font-size:34px;font-weight:700;margin-top:6px;}
.card .foot{font-size:12px;color:var(--muted);margin-top:6px;}
.delta.up{color:var(--promoter);}.delta.down{color:var(--detractor);}
.pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;}
.pill.world_class{background:#d6f5e8;color:#0b7a54;}.pill.excellent{background:#d9f0e3;color:#12764f;}
.pill.good{background:#eef4ff;color:#2a5bd7;}.pill.needs_attention{background:#fde3dd;color:#b4331d;}
.bar{display:flex;height:12px;border-radius:6px;overflow:hidden;margin-top:10px;}
.bar>span{display:block;}.bar .p{background:var(--promoter);}.bar .pa{background:var(--passive);}.bar .d{background:var(--detractor);}
.legend{display:flex;gap:14px;font-size:12px;color:var(--muted);margin-top:8px;}
.legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:middle;}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:20px;}
.panel h2{font-size:15px;margin:0;}
.panel .panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);}
th,td{text-align:left;padding:12px 14px;font-size:13px;border-bottom:1px solid var(--line);}
th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.03em;cursor:pointer;}
tbody tr:hover{background:#fafbfc;cursor:pointer;}
td.num{font-variant-numeric:tabular-nums;}
.score-chip{font-weight:700;}.score-chip.promoter{color:var(--promoter);}.score-chip.passive{color:var(--passive);}.score-chip.detractor{color:var(--detractor);}
.drawer-backdrop{position:fixed;inset:0;background:rgba(16,32,44,.4);}
.drawer{position:fixed;top:0;right:0;height:100%;width:600px;max-width:100vw;background:var(--bg);box-shadow:-8px 0 30px rgba(0,0,0,.15);overflow-y:auto;padding:24px;}
.drawer .dh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.drawer h2{margin:0;font-size:18px;}
.muted{color:var(--muted);}
.close-x{border:0;background:transparent;font-size:22px;cursor:pointer;color:var(--muted);}
.reason{color:var(--muted);font-size:12px;max-width:240px;}
</style>
</head>

<div class="shell">
<header class="top"><div><h1>NPS dashboard</h1><div class="sub" id="sub"></div></div></header>
<div class="banner">Standalone preview · demo data baked in · same UI as the React app in <code>packages/dashboard</code>. Filters, chart toggle, drill-in and CSV download all work with no backend.</div>
<div class="filters">
  <div class="seg" id="prodSeg">
    <button data-p="all" class="active">All products</button>
    <button data-p="crm">CRM</button>
    <button data-p="marketing">Marketing</button>
    <button data-p="bot">Bot</button>
  </div>
  <select id="range">
    <option value="12">Last 12 months</option>
    <option value="6">Last 6 months</option>
    <option value="31">All time (30 mo)</option>
  </select>
  <div class="spacer"></div>
  <button class="btn" id="exportAll">⬇ Export all (CSV)</button>
</div>
<div class="grid" id="cards"></div>
<div class="panel">
  <div class="panel-head">
    <div><h2>NPS trend</h2><span class="muted" id="trendSub" style="font-size:12px"></span></div>
    <div class="seg" id="trendSeg"><button data-s="overall" class="active">Overall</button><button data-s="split">By product</button></div>
  </div>
  <div style="height:300px"><canvas id="trend"></canvas></div>
</div>
<div class="panel-head" style="margin:4px 2px 10px"><h2 style="font-size:15px;margin:0">Accounts</h2></div>
<table id="tbl"><thead><tr><th>Account</th><th data-sort="nps">NPS ▾</th><th>CRM</th><th>Marketing</th><th>Bot</th><th data-sort="responses">Responses</th><th data-sort="latest">Latest</th></tr></thead><tbody id="tbody"></tbody></table>
</div>

<script>
const R = DATA.responses, ACC = DATA.accounts;
const PERIODS = [...new Set(R.map(r=>r.period))].sort();
const state = { product:'all', months:12, split:false, sort:'nps' };

const cat = s => s>=9?'promoter':s>=7?'passive':'detractor';
function counts(rows){const c={promoters:0,passives:0,detractors:0};for(const r of rows){if(r.category==='promoter')c.promoters++;else if(r.category==='passive')c.passives++;else c.detractors++;}return c;}
function nps(c){const n=c.promoters+c.passives+c.detractors;return n?Math.round((c.promoters-c.detractors)/n*100):null;}
function rating(v){if(v===null)return null;if(v<0)return'needs_attention';if(v<50)return'good';if(v<70)return'excellent';return'world_class';}
const RLABEL={world_class:'World class',excellent:'Excellent',good:'Good',needs_attention:'Needs attention'};

function activePeriods(){return PERIODS.slice(Math.max(0,PERIODS.length-state.months));}
function filtered(){const ps=new Set(activePeriods());return R.filter(r=>(state.product==='all'||r.product===state.product)&&ps.has(r.period));}

function renderCards(){
  const rows=filtered(); const c=counts(rows); const v=nps(c);
  const n=rows.length||1;
  // previous equal window
  const aps=activePeriods(); const len=aps.length;
  const startIdx=PERIODS.length-state.months;
  const prevPs=new Set(PERIODS.slice(Math.max(0,startIdx-len),startIdx));
  const prevRows=R.filter(r=>(state.product==='all'||r.product===state.product)&&prevPs.has(r.period));
  const pv=nps(counts(prevRows));
  const delta=(v!==null&&pv!==null)?v-pv:null;
  const pct=x=>Math.round(x/n*100);
  const rr=Math.round(rows.length/(rows.length/0.72)); // responded/(prompted approx) demo
  const rt=rating(v);
  document.getElementById('cards').innerHTML=`
   <div class="card"><div class="label">NPS score</div><div class="big">${v??'—'}</div>
     <div class="foot">${rt?`<span class="pill ${rt}">${RLABEL[rt]}</span> `:''}${delta!==null?`<span class="delta ${delta>=0?'up':'down'}">${delta>0?'+':''}${delta} vs prev</span>`:''}</div></div>
   <div class="card"><div class="label">Responses</div><div class="big">${rows.length.toLocaleString()}</div><div class="foot">Response rate ~72% (demo)</div></div>
   <div class="card"><div class="label">Mix</div>
     <div class="bar"><span class="p" style="width:${pct(c.promoters)}%"></span><span class="pa" style="width:${pct(c.passives)}%"></span><span class="d" style="width:${pct(c.detractors)}%"></span></div>
     <div class="legend"><span><i style="background:var(--promoter)"></i>Prom ${pct(c.promoters)}%</span><span><i style="background:var(--passive)"></i>Pass ${pct(c.passives)}%</span><span><i style="background:var(--detractor)"></i>Detr ${pct(c.detractors)}%</span></div></div>
   <div class="card"><div class="label">Promoters − Detractors</div><div class="big">${c.promoters}<span class="muted" style="font-size:18px"> / </span>${c.detractors}</div><div class="foot">${c.passives} passives (excluded)</div></div>`;
  document.getElementById('sub').textContent=`LimeChat · CRM · Marketing · Bot — ${aps[0]} → ${aps[aps.length-1]}`;
}

function seriesFor(prod){const ps=activePeriods();return ps.map(p=>{const rows=R.filter(r=>r.period===p&&(prod==='all'||r.product===prod));return nps(counts(rows));});}
let chart;
function renderTrend(){
  const ps=activePeriods();
  const ctx=document.getElementById('trend');
  const datasets=state.split?[
    {label:'CRM',data:seriesFor('crm'),borderColor:'#1fa97a',tension:.3,spanGaps:true,pointRadius:0,borderWidth:2},
    {label:'Marketing',data:seriesFor('marketing'),borderColor:'#e0a500',tension:.3,spanGaps:true,pointRadius:0,borderWidth:2},
    {label:'Bot',data:seriesFor('bot'),borderColor:'#3a6df0',tension:.3,spanGaps:true,pointRadius:0,borderWidth:2},
  ]:[{label:'NPS',data:seriesFor(state.product),borderColor:'#16202c',tension:.3,spanGaps:true,pointRadius:2,borderWidth:2.5}];
  document.getElementById('trendSub').textContent=`Monthly, ${ps.length} periods`;
  if(chart)chart.destroy();
  chart=new Chart(ctx,{type:'line',data:{labels:ps,datasets},options:{responsive:true,maintainAspectRatio:false,
    scales:{y:{min:-100,max:100,grid:{color:'#eef1f5'}},x:{grid:{display:false}}},
    plugins:{legend:{display:state.split}}}});
}

function accountRollup(){
  const ps=new Set(activePeriods());
  const map={};
  for(const r of R){
    if(!ps.has(r.period))continue;
    if(state.product!=='all'&&r.product!==state.product)continue;
    const a=map[r.accountRef]||(map[r.accountRef]={ref:r.accountRef,name:r.accountName,rows:[],byP:{crm:[],marketing:[],bot:[]},latest:null,latestAt:''});
    a.rows.push(r); a.byP[r.product].push(r);
    if(r.at>a.latestAt){a.latestAt=r.at;a.latest=r.score;}
  }
  let arr=Object.values(map).map(a=>({ref:a.ref,name:a.name,nps:nps(counts(a.rows)),responses:a.rows.length,
    crm:nps(counts(a.byP.crm)),marketing:nps(counts(a.byP.marketing)),bot:nps(counts(a.byP.bot)),latest:a.latest,latestAt:a.latestAt}));
  arr.sort((x,y)=>state.sort==='responses'?y.responses-x.responses:state.sort==='latest'?y.latestAt.localeCompare(x.latestAt):(y.nps??-101)-(x.nps??-101));
  return arr;
}
function chip(v){if(v===null)return'<span class="muted">—</span>';const c=v<0?'detractor':v<50?'passive':'promoter';return`<span class="score-chip ${c}">${v}</span>`;}
function renderTable(){
  const arr=accountRollup();
  document.getElementById('tbody').innerHTML=arr.map(a=>`<tr data-ref="${a.ref}">
    <td><div style="font-weight:600">${a.name}</div><div class="muted" style="font-size:11px">${a.ref}</div></td>
    <td class="num">${chip(a.nps)}</td><td class="num">${chip(a.crm)}</td><td class="num">${chip(a.marketing)}</td><td class="num">${chip(a.bot)}</td>
    <td class="num">${a.responses}</td><td class="num">${a.latest??'—'}</td></tr>`).join('');
  document.querySelectorAll('#tbody tr').forEach(tr=>tr.onclick=()=>openDrawer(tr.dataset.ref));
}

function csvCell(v){let s=v==null?'':String(v);if(/^[=+\-@]/.test(s))s="'"+s;return '"'+s.replace(/"/g,'""')+'"';}
function toCsv(rows){const H=['period','response_at','product','account_ref','account_name','email','score','category','reason'];
  return [H.join(',')].concat(rows.map(r=>[r.period,r.at,r.product,r.accountRef,r.accountName,r.email,r.score,r.category,r.reason].map(csvCell).join(','))).join('\n');}
function download(name,text){const b=new Blob([text],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href);}

function openDrawer(ref){
  const ps=new Set(activePeriods());
  const rows=R.filter(r=>r.accountRef===ref&&ps.has(r.period)&&(state.product==='all'||r.product===state.product)).sort((a,b)=>b.at.localeCompare(a.at));
  const a=accountRollup().find(x=>x.ref===ref)||{name:ref,nps:null,responses:rows.length,latest:null};
  document.getElementById('drawerRoot').innerHTML=`
   <div class="drawer-backdrop"></div>
   <div class="drawer">
     <div class="dh"><div><h2>${a.name}</h2><div class="muted" style="font-size:12px">${ref}</div></div><button class="close-x">×</button></div>
     <div class="grid" style="grid-template-columns:repeat(3,1fr)">
       <div class="card"><div class="label">Account NPS</div><div class="big">${a.nps??'—'}</div></div>
       <div class="card"><div class="label">Responses</div><div class="big">${a.responses}</div></div>
       <div class="card"><div class="label">Latest score</div><div class="big">${a.latest??'—'}</div></div></div>
     <div style="display:flex;justify-content:space-between;align-items:center;margin:18px 0 10px">
       <h2 style="font-size:15px;margin:0">Responses by user</h2>
       <button class="btn primary" id="dlAcc">⬇ Download report (CSV)</button></div>
     <table><thead><tr><th>Email</th><th>Product</th><th>Month</th><th>Score</th><th>Reason</th></tr></thead>
     <tbody>${rows.map(r=>`<tr style="cursor:default"><td>${r.email}</td><td>${r.product}</td><td class="num">${r.period}</td><td class="num"><span class="score-chip ${r.category}">${r.score}</span></td><td class="reason">${r.reason}</td></tr>`).join('')}</tbody></table>
   </div>`;
  document.querySelector('.drawer-backdrop').onclick=close;
  document.querySelector('.close-x').onclick=close;
  document.getElementById('dlAcc').onclick=()=>download(`nps_${ref}.csv`,toCsv(rows));
  function close(){document.getElementById('drawerRoot').innerHTML='';}
}

function renderAll(){renderCards();renderTrend();renderTable();}
document.querySelectorAll('#prodSeg button').forEach(b=>b.onclick=()=>{state.product=b.dataset.p;document.querySelectorAll('#prodSeg button').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderAll();});
document.querySelectorAll('#trendSeg button').forEach(b=>b.onclick=()=>{state.split=b.dataset.s==='split';document.querySelectorAll('#trendSeg button').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderTrend();});
document.getElementById('range').onchange=e=>{state.months=+e.target.value;renderAll();};
document.querySelectorAll('#tbl th[data-sort]').forEach(th=>th.onclick=()=>{state.sort=th.dataset.sort;renderTable();});
document.getElementById('exportAll').onclick=()=>download('nps_all_accounts.csv',toCsv(filtered()));
renderAll();
</script>
</body></html>
